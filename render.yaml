services:
  - type: web
    name: loan-savings-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loan-savings-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.12
